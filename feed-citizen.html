<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITADEL | Citizen Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans flex justify-center min-h-screen transition-theme matrix-bg">

    <div class="max-w-md w-full relative flex flex-col h-screen overflow-hidden border-x border-slate-200 dark:border-slate-800 shadow-2xl bg-white/40 dark:bg-slate-900/40">
        
        <header class="glass-panel p-4 flex justify-between items-center z-20 sticky top-0">
            <div class="flex items-center gap-3">
                <a href="dash-citizen.html" class="p-2 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 rounded-full transition-colors flex items-center justify-center">
                    <svg class="w-4 h-4 text-slate-600 dark:text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <div>
                    <h1 class="text-xl font-black tracking-tighter text-red-600 dark:text-red-500">CITADEL <span class="text-slate-900 dark:text-white text-lg">| FEED</span></h1>
                </div>
            </div>
            <div class="text-right flex items-center gap-2 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700">
                <svg class="w-4 h-4 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                <span id="credit-tally" class="text-sm font-black text-amber-500">450</span>
            </div>
        </header>

        <div class="p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm border-b border-slate-200 dark:border-slate-800 z-10 shadow-sm flex flex-col transition-all">
            <textarea id="issue-desc" rows="2" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-red-500 focus:outline-none resize-none transition-colors" placeholder="Report an infrastructure anomaly..."></textarea>
            
            <div id="camera-container" class="hidden mt-3 relative rounded-lg overflow-hidden bg-black border border-slate-300 dark:border-slate-700">
                <video id="live-webcam" autoplay playsinline class="w-full h-48 object-cover"></video>
                <canvas id="snapshot-canvas" class="hidden w-full h-48 object-cover"></canvas>
                <button id="btn-capture" class="absolute bottom-3 left-1/2 transform -translate-x-1/2 bg-red-600 text-white font-black px-6 py-2 rounded-full text-xs shadow-lg uppercase tracking-widest border-2 border-white/20 btn-glow glow-red">
                    Snap Evidence
                </button>
            </div>

            <div class="flex justify-between items-center mt-3">
                <div class="flex gap-2">
                    <button onclick="startCivicCamera()" class="p-2 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 rounded-full text-slate-700 dark:text-slate-300 transition-colors shadow-inner">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                    <button id="btn-gps" class="p-2 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 rounded-full text-slate-700 dark:text-slate-300 transition-colors flex items-center gap-1 shadow-inner">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                </div>
                <button id="btn-submit" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black text-xs px-5 py-2.5 rounded-lg uppercase tracking-widest shadow-md flex items-center gap-2 btn-glow glow-blue">
                    <span id="submit-text">Submit Issue</span>
                    <div id="ai-loading-spinner" class="hidden w-3 h-3 border-2 border-white/30 dark:border-black/30 border-t-white dark:border-t-black rounded-full animate-spin"></div>
                </button>
            </div>
            <p id="location-text" class="text-[10px] text-slate-500 font-mono mt-2 hidden"></p>
        </div>

        <div id="feed-container" class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
            <div class="text-center text-slate-500 text-xs py-10 font-mono animate-pulse">SYNCING WITH MUNICIPAL GRID...</div>
        </div>

        <div id="ai-overlay" class="absolute inset-0 bg-slate-950/95 backdrop-blur-xl z-50 flex flex-col items-center justify-center hidden px-6 text-center animate-enter">
            <div class="relative w-24 h-24 mb-6">
                <div class="absolute inset-0 border-4 border-slate-800 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-red-500 border-t-transparent rounded-full animate-spin shadow-[0_0_15px_rgba(239,68,68,0.5)]"></div>
            </div>
            <p id="ai-status-text" class="text-white font-mono text-xs tracking-widest uppercase font-black leading-relaxed">Extracting Visual Data...</p>
            <div class="w-full max-w-[200px] h-1 bg-slate-800 rounded-full mt-6 overflow-hidden">
                <div id="ai-progress-bar" class="h-full bg-red-500 w-0 transition-all duration-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
            </div>
        </div>

        <div class="glass-panel absolute bottom-0 left-0 w-full p-3 flex justify-around items-center z-[999] shadow-[0_-4px_20px_rgba(0,0,0,0.1)]">
            <a href="dash-citizen.html" class="flex flex-col items-center text-slate-500 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-widest mt-1">Profile</span>
            </a>
            <a href="feed-citizen.html" class="flex flex-col items-center text-red-600 dark:text-red-500 transition-colors">
                <svg class="w-6 h-6 drop-shadow-[0_0_8px_rgba(239,68,68,0.4)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-widest mt-1">City Feed</span>
            </a>
            <button onclick="document.documentElement.classList.toggle('dark')" class="flex flex-col items-center text-slate-500 hover:text-amber-500 dark:text-slate-400 dark:hover:text-amber-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-widest mt-1">Dark Mode</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3Pickeeu-enFx1IuLTh3ZfsJ7mUm3GVE",
            authDomain: "citadel----core.firebaseapp.com",
            projectId: "citadel----core",
            storageBucket: "citadel----core.firebasestorage.app",
            messagingSenderId: "458996523153",
            appId: "1:458996523153:web:74a80e592b475951c25f30"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentGPS = "Location Required";
        let hasImage = false;
        let cameraStream = null;
        let aiModel = null;
        let citizenName = sessionStorage.getItem('citadel_user_name') || 'Anonymous Citizen';

        async function loadTensorFlow() {
            document.getElementById('submit-text').innerText = "Loading AI...";
            document.getElementById('ai-loading-spinner').classList.remove('hidden');
            document.getElementById('btn-submit').disabled = true;
            try {
                aiModel = await mobilenet.load();
                document.getElementById('submit-text').innerText = "Submit Issue";
                document.getElementById('ai-loading-spinner').classList.add('hidden');
                document.getElementById('btn-submit').disabled = false;
            } catch (error) {
                document.getElementById('submit-text').innerText = "AI ERROR";
            }
        }
        loadTensorFlow();

        const civicPlaceholderImages = [
            "https://images.unsplash.com/photo-1515162816999-a0c47dc192f7?auto=format&fit=crop&q=80&w=800", 
            "https://images.unsplash.com/photo-1584464491033-06628f3a6b7b?auto=format&fit=crop&q=80&w=800"
        ];

        document.getElementById('btn-gps').addEventListener('click', () => {
            const locText = document.getElementById('location-text');
            locText.classList.remove('hidden');
            locText.innerText = "ACQUIRING SATELLITE LOCK...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentGPS = `${position.coords.latitude.toFixed(4)}° N, ${position.coords.longitude.toFixed(4)}° E`;
                        locText.innerText = `LOCKED: ${currentGPS}`;
                        locText.classList.add('text-green-500');
                    },
                    (error) => {
                        currentGPS = "13.0827° N, 80.2707° E";
                        locText.innerText = `MANUAL LOCK: ${currentGPS}`;
                    }
                );
            }
        });

        window.startCivicCamera = async function() {
            const container = document.getElementById('camera-container');
            const video = document.getElementById('live-webcam');
            const canvas = document.getElementById('snapshot-canvas');
            const btn = document.getElementById('btn-capture');

            container.classList.remove('hidden');
            video.classList.remove('hidden');
            canvas.classList.add('hidden');
            btn.classList.remove('hidden');

            try {
                // CHANGED: Forces the rear camera (environment) instead of the selfie cam
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } } 
                });
                video.srcObject = cameraStream;
            } catch (err) { 
                // Fallback: If device doesn't have a rear camera (like a laptop), use the default
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = cameraStream;
                } catch (fallbackErr) {
                    alert("Camera access denied or hardware not found."); 
                }
            }
        };

        document.getElementById('btn-capture').addEventListener('click', () => {
            const video = document.getElementById('live-webcam');
            const canvas = document.getElementById('snapshot-canvas');
            canvas.width = 224; canvas.height = 224;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            cameraStream.getTracks().forEach(track => track.stop());
            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            document.getElementById('btn-capture').classList.add('hidden');
            hasImage = true;
            document.getElementById('issue-desc').placeholder = "Civic damage captured. Describe the severity...";
        });

        document.getElementById('btn-submit').addEventListener('click', async () => {
            const desc = document.getElementById('issue-desc').value.trim();
            if (!desc || !hasImage || currentGPS === "Location Required") {
                alert("Protocol Error: Capture photo, acquire GPS, and describe issue.");
                return;
            }

            const overlay = document.getElementById('ai-overlay');
            const status = document.getElementById('ai-status-text');
            const progress = document.getElementById('ai-progress-bar');
            
            overlay.classList.remove('hidden');
            status.classList.remove('text-green-400', 'text-red-500');
            status.classList.add('text-white');
            progress.style.width = "40%";
            status.innerText = "RUNNING TENSORFLOW PIXEL ANALYSIS...";

            try {
                const canvas = document.getElementById('snapshot-canvas');
                const predictions = await aiModel.classify(canvas);
                const detectedItemsString = predictions.map(p => p.className.toLowerCase()).join(", ");
                
                progress.style.width = "80%";
                status.innerText = `AI DETECTED: [${predictions[0].className.toUpperCase()}]... VERIFYING CREDIBILITY.`;

                const civicKeywords = ['street', 'road', 'wall', 'fence', 'building', 'dirt', 'concrete', 'paving', 'asphalt', 'pole', 'pipe'];
                const isCredible = civicKeywords.some(keyword => detectedItemsString.includes(keyword));

                setTimeout(() => {
                    if (isCredible) {
                        status.innerText = `THREAT VERIFIED.\nAI CONFIRMED: ${predictions[0].className.toUpperCase()}`;
                        status.classList.replace('text-white', 'text-green-400');
                        progress.style.width = "100%";
                        progress.classList.replace('bg-red-500', 'bg-green-500');
                        savePostToFirebase(desc, predictions[0].className.toUpperCase());
                    } else {
                        status.innerText = `AI REJECTED POST.\nCIVIC INFRASTRUCTURE NOT DETECTED.`;
                        status.classList.replace('text-white', 'text-red-500');
                        progress.style.width = "100%";
                        setTimeout(() => {
                            overlay.classList.add('hidden');
                            progress.style.width = "0%";
                        }, 3000);
                    }
                }, 1500);

            } catch (err) { status.innerText = "CLASSIFICATION FAILED."; }
        });

        async function savePostToFirebase(description, aiDetection) {
            const assignedFeedImage = civicPlaceholderImages[Math.floor(Math.random() * civicPlaceholderImages.length)];
            const finalDescription = `${description}\n\n[SYSTEM LOG: Vision AI verified presence of ${aiDetection}]`;
            try {
                await addDoc(collection(db, "reports"), {
                    author: citizenName, desc: finalDescription, location: currentGPS,
                    upvotes: 0, status: 'OPEN', imageUrl: assignedFeedImage, timestamp: serverTimestamp()
                });
                
                document.getElementById('issue-desc').value = '';
                document.getElementById('camera-container').classList.add('hidden');
                hasImage = false;
                
                setTimeout(() => {
                    document.getElementById('ai-overlay').classList.add('hidden');
                    document.getElementById('ai-progress-bar').classList.replace('bg-green-500', 'bg-red-500');
                }, 1500);
            } catch (e) { console.error("Error adding document: ", e); }
        }

        // --- UPGRADED CASCADING FEED ENGINE ---
        const feedContainer = document.getElementById('feed-container');
        const q = query(collection(db, "reports"), orderBy("timestamp", "desc")); 

        onSnapshot(q, (snapshot) => {
            feedContainer.innerHTML = ''; 
            let delayCounter = 0; // Animation Timer

            snapshot.forEach((doc) => {
                const data = doc.data();
                const postId = doc.id;
                
                delayCounter++;
                let delayClass = delayCounter > 5 ? 'delay-400' : `delay-${delayCounter * 100}`;
                
                const postHTML = `
                    <div class="glass-panel rounded-xl overflow-hidden animate-enter ${delayClass}">
                        <div class="p-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800/50">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center font-black text-red-600 dark:text-red-400 text-xs">${data.author.charAt(0)}</div>
                                <div>
                                    <p class="text-xs font-bold">${data.author}</p>
                                    <p class="text-[9px] font-mono text-slate-500 flex items-center gap-1">
                                        <svg class="w-3 h-3 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                                        ${data.location}
                                    </p>
                                </div>
                            </div>
                            <span class="text-[9px] bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 font-black tracking-widest px-2 py-1 rounded uppercase border border-amber-200 dark:border-amber-800/50">${data.status}</span>
                        </div>
                        
                        <img src="${data.imageUrl}" class="w-full h-48 object-cover opacity-90" alt="Reported Issue">
                        
                        <div class="p-4">
                            <p class="text-sm leading-relaxed whitespace-pre-line">${data.desc}</p>
                            
                            <div class="mt-4 flex items-center justify-between border-t border-slate-200 dark:border-slate-800/50 pt-3">
                                <button onclick="upvotePost('${postId}')" class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 dark:bg-slate-800 hover:bg-red-100 dark:hover:bg-red-900/40 rounded-lg text-slate-600 dark:text-slate-300 hover:text-red-600 dark:hover:text-red-400 transition-colors border border-slate-200 dark:border-slate-700 btn-glow glow-red">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"></path></svg>
                                    <span class="text-sm font-black">${data.upvotes}</span>
                                </button>
                                <span class="text-[10px] font-mono text-green-600 dark:text-green-400 font-bold bg-green-50 dark:bg-green-900/30 px-2 py-1 rounded border border-green-200 dark:border-green-800/50">AI VERIFIED</span>
                            </div>
                        </div>
                    </div>
                `;
                feedContainer.innerHTML += postHTML;
            });
        });

        window.upvotePost = async function(id) {
            const postRef = doc(db, "reports", id);
            await updateDoc(postRef, { upvotes: increment(1) });
            let credits = parseInt(document.getElementById('credit-tally').innerText);
            document.getElementById('credit-tally').innerText = credits + 5;
        }
    </script>
</body>
</html>
