<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITADEL | Citizen Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans flex justify-center min-h-screen transition-theme matrix-bg">

    <div class="max-w-md w-full relative flex flex-col h-screen overflow-hidden border-x border-slate-200 dark:border-slate-800 shadow-2xl bg-white/40 dark:bg-slate-900/40">
        
        <header class="glass-panel p-4 flex justify-between items-center z-20 sticky top-0 border-b border-slate-200 dark:border-slate-800/50">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-red-600 dark:text-red-500 drop-shadow-[0_0_8px_rgba(239,68,68,0.3)]">CITADEL</h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mt-1">Citizen Portal</p>
            </div>
            <a href="index.html" class="px-4 py-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-[10px] font-black uppercase tracking-widest rounded transition-all shadow-md btn-glow glow-red">
                Sign Out
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 pb-24">
            
            <div class="glass-panel p-6 rounded-2xl shadow-xl relative overflow-hidden animate-enter delay-100">
                <div class="absolute top-0 right-0 w-32 h-32 bg-red-500/10 dark:bg-red-500/20 rounded-full -mr-16 -mt-16 pointer-events-none blur-xl"></div>

                <div class="flex items-center gap-5 mb-6 relative z-10">
                    <div class="w-16 h-16 rounded-full border-2 border-green-500 p-0.5 flex-shrink-0 relative shadow-[0_0_15px_rgba(34,197,94,0.3)] bg-white dark:bg-slate-900">
                        <div class="w-full h-full bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center font-black text-slate-400 dark:text-slate-500 text-xl" id="profile-initial">
                            ?
                        </div>
                        <div class="absolute -bottom-1 -right-1 bg-green-500 w-6 h-6 rounded-full border-2 border-white dark:border-slate-900 flex items-center justify-center text-white">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                    <div>
                        <h2 id="profile-name" class="text-xl font-black text-slate-900 dark:text-white uppercase tracking-tight drop-shadow-sm">LOADING...</h2>
                        <span class="inline-block mt-1 text-[9px] bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-black tracking-widest px-2 py-1 rounded-md uppercase border border-slate-200 dark:border-slate-700">Verified Citizen</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-slate-200 dark:border-slate-700/50 pt-5 relative z-10">
                    <div>
                        <p class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">Registered Email</p>
                        <p id="profile-email" class="text-xs font-bold text-slate-700 dark:text-slate-300 truncate">...</p>
                    </div>
                    <div>
                        <p class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">Clearance Level</p>
                        <p class="text-xs font-bold text-slate-700 dark:text-slate-300 text-green-600 dark:text-green-400 drop-shadow-sm">Active</p>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 dark:bg-slate-950 p-6 rounded-2xl border border-slate-800 dark:border-slate-800 shadow-[0_10px_30px_rgba(245,158,11,0.15)] text-white flex justify-between items-center animate-enter delay-200">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Civic Reputation</p>
                    <div class="flex items-center gap-2">
                        <svg class="w-6 h-6 text-amber-400 drop-shadow-[0_0_8px_rgba(245,158,11,0.5)]" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                        <span class="text-3xl font-black text-white">450</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-[10px] bg-amber-500/20 text-amber-400 font-bold px-2 py-1 rounded uppercase tracking-widest border border-amber-500/30 shadow-inner">Level 4</span>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4 pt-2 animate-enter delay-300">
                <a href="feed-citizen.html" class="group glass-panel p-5 rounded-xl hover:shadow-lg transition-all flex items-center justify-between btn-glow">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg flex items-center justify-center group-hover:scale-105 transition-transform border border-red-200 dark:border-red-800/50">
                            <svg class="w-6 h-6 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                        </div>
                        <div>
                            <h3 class="font-black text-slate-800 dark:text-white uppercase tracking-tight">City Feed & Reports</h3>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Report issues & upvote problems.</p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-slate-300 dark:text-slate-600 group-hover:text-red-500 dark:group-hover:text-red-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                </a>

                <a href="hub-ngo.html" class="group glass-panel p-5 rounded-xl hover:shadow-lg transition-all flex items-center justify-between btn-glow">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-lg flex items-center justify-center group-hover:scale-105 transition-transform border border-emerald-200 dark:border-emerald-800/50">
                            <svg class="w-6 h-6 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                        <div>
                            <h3 class="font-black text-slate-800 dark:text-white uppercase tracking-tight">NGO Hub</h3>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Join community organizations.</p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-slate-300 dark:text-slate-600 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                </a>
            </div>
        </div>

        <div class="glass-panel absolute bottom-0 left-0 w-full p-3 flex justify-around items-center z-[999] shadow-[0_-4px_20px_rgba(0,0,0,0.1)]">
            <a href="dash-citizen.html" class="flex flex-col items-center text-red-600 dark:text-red-500 transition-colors">
                <svg class="w-6 h-6 drop-shadow-[0_0_8px_rgba(239,68,68,0.4)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-widest mt-1">Profile</span>
            </a>
            
            <a href="feed-citizen.html" class="flex flex-col items-center text-slate-500 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-widest mt-1">City Feed</span>
            </a>
            
            <button onclick="document.documentElement.classList.toggle('dark')" class="flex flex-col items-center text-slate-500 hover:text-amber-500 dark:text-slate-400 dark:hover:text-amber-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-widest mt-1">Dark Mode</span>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const name = sessionStorage.getItem('citadel_user_name') || 'Authorized Citizen';
            const email = sessionStorage.getItem('citadel_user_email') || 'classified@node.gov';

            document.getElementById('profile-name').innerText = name;
            document.getElementById('profile-initial').innerText = name.charAt(0).toUpperCase();
            document.getElementById('profile-email').innerText = email;
        });
    </script>
</body>
</html>
